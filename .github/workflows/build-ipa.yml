name: Build IPA

on:
  workflow_dispatch:
  push:
    branches: [main, master]

jobs:
  build:
    runs-on: macos-14
    steps:
      - name: 1. Kodni yuklab olish
        uses: actions/checkout@v4

      - name: 2. Bun o'rnatish
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: 3. Bog'liqliklarni o'rnatish
        run: bun install

      - name: 4. Veb-qismni yig'ish
        run: bun run build
        env:
          NODE_ENV: production

      - name: 5. Capacitor-ni sozlash va iOS platformasini tayyorlash
        run: |
          if [ ! -d "ios" ]; then
            npx cap add ios
          fi
          
          npx cap sync ios
          
          PLIST="ios/App/App/Info.plist"
          if [ -f "$PLIST" ]; then
            plutil -replace NSCameraUsageDescription -string "ATTO QR kodlarni skanerlash uchun kameraga kirish huquqini talab qiladi" "$PLIST"
          else
            echo "Xatolik: Info.plist fayli ($PLIST) topilmadi!"
            exit 1
          fi

      - name: 6. iOS uchun native modullarni o'rnatish (CocoaPods)
        # Podfile `ios/App` papkasida joylashganligi uchun shu yerdan ishga tushiramiz
        run: cd ios/App && pod install && cd ../..

      - name: 7. Xcode loyihasini yig'ish va imzosiz IPA yaratish
        run: |
          xcodebuild clean build -workspace ios/App/App.xcworkspace \
            -scheme App \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath ios/App/build \
            CODE_SIGNING_ALLOWED=NO

          mkdir -p Payload
          cp -r ios/App/build/Build/Products/Release-iphoneos/App.app Payload/
          zip -r ATTO.ipa Payload

      - name: 8. Tayyor IPA faylini artefakt sifatida saqlash
        uses: actions/upload-artifact@v4
        with:
          name: ATTO-ipa
          path: ATTO.ipa
