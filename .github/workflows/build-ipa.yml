name: Build IPA

on:
  workflow_dispatch:
  push:
    branches: [main, master]

jobs:
  build:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Build web
        run: bun run build
        env:
          NODE_ENV: production

      - name: Debug Build Output
        run: |
          echo "Listing dist directory content:"
          ls -R dist || echo "dist directory not found"

      - name: Capacitor Sync
        run: |
          # Ensure dist directory exists and has index.html
          if [ ! -f "dist/index.html" ]; then
            echo "Error: dist/index.html not found after build!"
            exit 1
          fi
          
          # Install Capacitor platforms if not already present
          if [ ! -d "ios" ]; then
            npx cap add ios
          fi
          
          # Generate Icons and Splash screens
          # This step is commented out as the source file is missing
          # mkdir -p assets
          # cp "atto icon.jpg" assets/icon.jpg
          # cp "atto icon.jpg" assets/splash.jpg
          # npx capacitor-assets generate --ios
          
          # Sync and install pods
          npx cap sync ios
          
          # Add Camera permissions to Info.plist
          PLIST="ios/App/App/Info.plist"
          if [ -f "$PLIST" ]; then
            plutil -replace NSCameraUsageDescription -string "ATTO QR kodlarni skanerlash uchun kameraga kirish huquqini talab qiladi" "$PLIST"
            plutil -replace NSPhotoLibraryUsageDescription -string "ATTO QR kodlarni saqlash uchun rasm galereyasiga kirish huquqini talab qiladi" "$PLIST"
            plutil -replace NSPhotoLibraryAddUsageDescription -string "ATTO QR kodlarni saqlash uchun rasm galereyasiga kirish huquqini talab qiladi" "$PLIST"
          fi
          
          cd ios/App && pod install && cd ../..

      - name: Build unsigned IPA
        run: |
          # Clean build folder
          rm -rf ios/App/build
          
          # Build the project
          xcodebuild clean build -workspace ios/App/App.xcworkspace \
            -scheme App \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath ios/App/build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            AD_HOC_CODE_SIGNING_ALLOWED=YES \
            COMPILER_INDEX_STORE_ENABLE=NO
          
          # Create IPA for TrollStore
          mkdir -p Payload
          cp -r ios/App/build/Build/Products/Release-iphoneos/App.app Payload/
          zip -r ATTO.ipa Payload

      - uses: actions/upload-artifact@v4
        with:
          name: ATTO-ipa
          path: ATTO.ipa