name: Build IPA

on:
  workflow_dispatch:
  push:
    branches: [main, master]

jobs:
  build:
    runs-on: macos-14
    steps:
      - name: 1. Checkout Code
        uses: actions/checkout@v4

      - name: 2. Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: 3. Install Dependencies
        run: bun install

      - name: 4. Build Web Assets
        run: bun run build
        env:
          NODE_ENV: production
      
      - name: 5. Debug Build Output
        run: |
          echo "Listing dist directory content:"
          ls -R dist || echo "dist directory not found"

      - name: 6. Capacitor Sync and Setup
        run: |
          if [ ! -f "dist/index.html" ]; then
            echo "Error: dist/index.html not found after build!"
            exit 1
          fi
          
          if [ ! -d "ios" ]; then
            npx cap add ios
          fi
          
          # This step requires the icon file to be in the root directory.
          # Assuming "atto icon.jpg" exists. If not, this will fail.
          # mkdir -p assets
          # cp "atto icon.jpg" assets/icon.jpg
          # cp "atto icon.jpg" assets/splash.jpg
          # npx capacitor-assets generate --ios
          
          npx cap sync ios
          
          PLIST="ios/App/App/Info.plist"
          if [ -f "$PLIST" ]; then
            plutil -replace NSCameraUsageDescription -string "ATTO QR kodlarni skanerlash uchun kameraga kirish huquqini talab qiladi" "$PLIST"
            plutil -replace NSPhotoLibraryUsageDescription -string "ATTO QR kodlarni saqlash uchun rasm galereyasiga kirish huquqini talab qiladi" "$PLIST"
            plutil -replace NSPhotoLibraryAddUsageDescription -string "ATTO QR kodlarni saqlash uchun rasm galereyasiga kirish huquqini talab qiladi" "$PLIST"
          fi
          
          cd ios/App && pod install && cd ../..

      - name: 7. Build IPA
        run: |
          # Although 'clean' is used, the subsequent build should correctly bundle resources
          # as per the successful example provided.
          xcodebuild clean build -workspace ios/App/App.xcworkspace \
            -scheme App \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath ios/App/build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY=""
          
          mkdir -p Payload
          cp -r ios/App/build/Build/Products/Release-iphoneos/App.app Payload/
          zip -r ATTO.ipa Payload

      - name: 8. Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ATTO-ipa
          path: ATTO.ipa
