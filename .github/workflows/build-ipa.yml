name: Build IPA

on:
  workflow_dispatch:
  push:
    branches: [main, master]

jobs:
  build:
    runs-on: macos-14
    steps:
      - name: 1. Checkout Code
        uses: actions/checkout@v4

      - name: 2. Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: 3. Install Dependencies
        run: bun install

      - name: 4. Build Web Assets
        run: bun run build
        env:
          NODE_ENV: production

      - name: 5. Sync Capacitor and Prepare iOS
        run: |
          if [ ! -d "ios" ]; then
            npx cap add ios
          fi
          npx cap sync ios
          PLIST="ios/App/App/Info.plist"
          if [ -f "$PLIST" ]; then
            plutil -replace NSCameraUsageDescription -string "ATTO requires camera access to scan QR codes" "$PLIST"
            plutil -replace NSPhotoLibraryUsageDescription -string "ATTO requires photo library access to save QR codes" "$PLIST"
            plutil -replace NSPhotoLibraryAddUsageDescription -string "ATTO requires photo library access to save QR codes" "$PLIST"
          else
            echo "Error: Info.plist not found at $PLIST!"
            exit 1
          fi

      - name: 6. Install Pods
        run: cd ios/App && pod install && cd ../..

      - name: 7. Build and Create IPA
        run: |
          xcodebuild clean build -workspace ios/App/App.xcworkspace \
            -scheme App \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath ios/App/build \
            CODE_SIGNING_ALLOWED=NO

          # Create Payload directory and copy the .app bundle
          mkdir -p Payload
          cp -r ios/App/build/Build/Products/Release-iphoneos/App.app Payload/

          # Zip to create the .ipa file
          zip -r ATTO.ipa Payload

      - name: 8. Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ATTO-ipa
          path: ATTO.ipa
