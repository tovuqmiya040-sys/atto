name: Build IPA

on:
  workflow_dispatch:
  push:
    branches: [main, master]

jobs:
  build:
    runs-on: macos-14
    steps:
      - name: 1. Kodni yuklab olish
        uses: actions/checkout@v4

      - name: 2. Bun o'rnatish
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: 3. Bog'liqliklarni o'rnatish
        run: bun install

      - name: 4. Veb-qismni yig'ish
        run: bun run build
        env:
          NODE_ENV: production

      - name: 5. Capacitorni sozlash va sinxronlash
        run: |
          # Capacitor iOS platformasini qo'shish (agar mavjud bo'lmasa)
          if [ ! -d "ios" ]; then
            npx cap add ios
          fi
          
          # Ikonka va Splash-skrinlar uchun resurslarni tayyorlash
          # DIQQAT: Loyihangiz ildizida "atto icon.jpg" fayli borligiga ishonch hosil qiling
          mkdir -p assets
          if [ -f "atto icon.jpg" ]; then
            cp "atto icon.jpg" assets/icon.jpg
            cp "atto icon.jpg" assets/splash.jpg
            # npx capacitor-assets generate --ios # Bu qadamni vaqtincha o'chirib turamiz, chunki u ba'zan muammo tug'dirishi mumkin
          else
            echo "Ogohlantirish: 'atto icon.jpg' fayli topilmadi. Ikonkalar generatsiya qilinmadi."
          fi
          
          # Eng muhim qadam: Veb-resurslarni native loyihaga sinxronlash
          npx cap sync ios
          
          # iOS loyihasining Info.plist fayliga kerakli ruxsatnomalarni qo'shish
          PLIST="ios/App/App/Info.plist"
          if [ -f "$PLIST" ]; then
            plutil -replace NSCameraUsageDescription -string "ATTO QR kodlarni skanerlash uchun kameraga kirish huquqini talab qiladi" "$PLIST"
            plutil -replace NSPhotoLibraryUsageDescription -string "ATTO QR kodlarni saqlash uchun rasm galereyasiga kirish huquqini talab qiladi" "$PLIST"
            plutil -replace NSPhotoLibraryAddUsageDescription -string "ATTO QR kodlarni saqlash uchun rasm galereyasiga kirish huquqini talab qiladi" "$PLIST"
          else
            echo "Xatolik: Info.plist fayli topilmadi!"
            exit 1
          fi

      - name: 6. iOS uchun native modullarni o'rnatish (CocoaPods)
        run: cd ios/App && pod install && cd ../..

      - name: 7. Xcode loyihasini yig'ish va imzosiz IPA yaratish
        run: |
          # Xcode loyihasini tozalash va yig'ish
          xcodebuild clean build -workspace ios/App/App.xcworkspace \
            -scheme App \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath ios/App/build \
            CODE_SIGNING_ALLOWED=NO

          # TrollStore uchun IPA yaratish
          mkdir -p Payload
          cp -r ios/App/build/Build/Products/Release-iphoneos/App.app Payload/
          zip -r ATTO.ipa Payload

      - name: 8. Tayyor IPA faylini artefakt sifatida saqlash
        uses: actions/upload-artifact@v4
        with:
          name: ATTO-ipa
          path: ATTO.ipa
