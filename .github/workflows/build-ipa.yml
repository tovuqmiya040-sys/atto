name: Build IPA

on:
  workflow_dispatch:
  push:
    branches: [main, master]

jobs:
  build:
    runs-on: macos-14
    steps:
      - name: 1. Checkout Code
        uses: actions/checkout@v4

      - name: 2. Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: 3. Install Dependencies
        run: bun install

      - name: 4. Build Web Assets
        run: bun run build
        env:
          NODE_ENV: production

      - name: 5. Add and Sync iOS Platform
        run: |
          npx cap add ios
          npx cap sync ios

      - name: 6. Set Permissions
        run: |
          PLIST="ios/App/App/Info.plist"
          if [ -f "$PLIST" ]; then
            plutil -replace NSCameraUsageDescription -string "ATTO requires camera access to scan QR codes" "$PLIST"
            plutil -replace NSPhotoLibraryUsageDescription -string "ATTO requires photo library access to save QR codes" "$PLIST"
            plutil -replace NSPhotoLibraryAddUsageDescription -string "ATTO requires photo library access to save QR codes" "$PLIST"
          else
            echo "Error: Info.plist not found at $PLIST!"
            exit 1
          fi

      - name: 7. Build, Package, and Sign IPA
        run: |
          # Build the Xcode project
          xcodebuild build -workspace ios/App/App.xcworkspace \
            -scheme App \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath ios/App/build \
            CODE_SIGNING_ALLOWED=NO

          # Create the Payload directory
          mkdir -p Payload
          
          # Copy the built .app bundle to Payload
          cp -r ios/App/build/Build/Products/Release-iphoneos/App.app Payload/

          # --- CRITICAL STEP: Force copy web assets to the .app bundle ---
          echo "--- Force copying web assets from dist to Payload/App.app/public ---"
          cp -R dist/. Payload/App.app/public/

          # --- DEBUG: Verify final contents of the Payload before zipping --- #
          echo "--- Listing Final Payload Contents ---"
          ls -lR Payload
          echo "------------------------------------"

          # Create the final IPA file
          zip -r ATTO.ipa Payload

      - name: 8. Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ATTO-ipa
          path: ATTO.ipa
