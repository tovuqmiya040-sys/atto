name: Build IPA

on:
  workflow_dispatch:
  push:
    branches: [main, master]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Build web
        run: bun run build
        env:
          NODE_ENV: production

      - name: Capacitor Sync
        run: |
          if [ ! -d "ios" ]; then
            npx cap add ios
          fi
          npx cap sync ios
          PLIST="ios/App/App/Info.plist"
          if [ -f "$PLIST" ]; then
            plutil -replace NSCameraUsageDescription -string "ATTO QR kodlarni skanerlash uchun kameraga kirish huquqini talab qiladi" "$PLIST"
            plutil -replace NSPhotoLibraryUsageDescription -string "ATTO QR kodlarni saqlash uchun rasm galereyasiga kirish huquqini talab qiladi" "$PLIST"
            plutil -replace NSPhotoLibraryAddUsageDescription -string "ATTO QR kodlarni saqlash uchun rasm galereyasiga kirish huquqini talab qiladi" "$PLIST"
          fi
          cd ios/App && pod install && cd ../..

      - name: Build and Package unsigned IPA
        run: |
          # Build the native project
          xcodebuild clean build -workspace ios/App/App.xcworkspace \
            -scheme App \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath ios/App/build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            AD_HOC_CODE_SIGNING_ALLOWED=YES \
            COMPILER_INDEX_STORE_ENABLE=NO
          
          # Create the IPA structure
          mkdir -p Payload
          cp -r ios/App/build/Build/Products/Release-iphoneos/App.app Payload/

          echo "Injecting web assets into the app bundle..."
          # The 'public' folder should have been copied by xcodebuild, but we do it manually to be sure.
          # The source 'ios/App/App/public' was populated by 'npx cap sync'
          cp -r ios/App/App/public Payload/App.app/

          echo "Final bundle content check:"
          ls -lR Payload/App.app/public
          
          # Zip into an IPA file
          zip -r ATTO.ipa Payload

      - uses: actions/upload-artifact@v4
        with:
          name: ATTO-ipa
          path: ATTO.ipa
